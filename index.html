<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Form Tính Tiền Hóa Đơn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f172a;
      --navy2:   #1e293b;
      --navy3:   #334155;
      --slate:   #475569;
      --muted:   #64748b;
      --border:  #2d3f55;
      --accent:  #3b82f6;
      --accent2: #1d4ed8;
      --gold:    #f59e0b;
      --red:     #ef4444;
      --green:   #10b981;
      --text:    #e2e8f0;
      --text2:   #94a3b8;
      --white:   #f8fafc;
      --card:    rgba(30,41,59,0.85);
      --radius:  12px;
      --shadow:  0 4px 24px rgba(0,0,0,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Background ─────────────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; z-index: 0;
      border-radius: 50%; filter: blur(80px); opacity: 0.12;
    }
    .bg-glow-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; right: -80px; }
    .bg-glow-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: 0; left: -60px; }

    /* ─── Layout ─────────────────────────────────────────── */
    .app-wrapper {
      position: relative; z-index: 1;
      height: 100vh; display: flex; flex-direction: column;
      padding: 0;
    }

    /* ─── Header ─────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.6);
      -webkit-app-region: drag;
    }
    .header-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }
    .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: var(--white); }
    .header-sub   { font-size: 11px; color: var(--text2); margin-top: 1px; }

    /* ─── Main scroll area ───────────────────────────────── */
    .main-content {
      flex: 1; overflow-y: auto; padding: 22px 28px 100px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }
    .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Cards ──────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card + .card { margin-top: 16px; }

    .card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .card-header-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .card-header-icon.blue   { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .card-header-icon.amber  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .card-header-icon.red    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .card-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text2);
    }

    .card-body { padding: 18px; }

    /* ─── Form fields ─────────────────────────────────────── */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    }
    .form-grid.single { grid-template-columns: 1fr; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text2);
    }
    .field input, .field select {
      padding: 10px 14px;
      background: rgba(15,23,42,0.7);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-app-region: no-drag;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .field input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      color: var(--muted);
    }
    .field input.money {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 15px;
      color: var(--gold);
    }
    .field select option { background: var(--navy2); color: var(--text); }

    .field-hint {
      font-size: 10px; color: var(--muted); margin-top: 2px;
    }

    /* ─── Result rows ─────────────────────────────────────── */
    .result-grid { display: flex; flex-direction: column; gap: 8px; }

    .result-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: rgba(15,23,42,0.5);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      transition: background 0.15s;
    }
    .result-row:hover { background: rgba(15,23,42,0.8); }
    .result-row.total {
      background: linear-gradient(135deg, rgba(29,78,216,0.3), rgba(59,130,246,0.2));
      border-color: rgba(59,130,246,0.4);
      padding: 13px 16px;
    }

    .result-label {
      font-size: 12px; color: var(--text2); font-weight: 500;
    }
    .result-row.total .result-label { color: #93c5fd; font-size: 13px; font-weight: 600; }

    .result-value {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px; font-weight: 600; color: var(--text);
    }
    .result-row.total .result-value { font-size: 16px; color: #60a5fa; }

    /* ─── Grand total ─────────────────────────────────────── */
    .grand-total {
      margin-top: 16px;
      background: linear-gradient(135deg, rgba(220,38,38,0.25), rgba(239,68,68,0.15));
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 0 30px rgba(239,68,68,0.1);
    }
    .grand-total-left { display: flex; flex-direction: column; gap: 3px; }
    .grand-total-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: #fca5a5;
    }
    .grand-total-label {
      font-size: 15px; font-weight: 800; color: var(--white);
    }
    .grand-total-value {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 26px; font-weight: 700;
      color: #f87171;
      text-shadow: 0 0 20px rgba(239,68,68,0.4);
    }
    .grand-total-value.active { animation: pulse 0.4s ease; }
    @keyframes pulse {
      0%  { transform: scale(1); }
      50% { transform: scale(1.06); }
      100%{ transform: scale(1); }
    }

    /* ─── Buttons ─────────────────────────────────────────── */
    .btn-row {
      display: flex; gap: 10px;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      background: rgba(15,23,42,0.7);
      position: sticky; bottom: 0;
    }
    .btn {
      flex: 1; padding: 12px 20px;
      border: none; border-radius: 9px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-app-region: no-drag;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ─── Toast ───────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy2); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 18px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(16,185,129,0.4); }
    .toast.error   { border-color: rgba(239,68,68,0.4); }

    /* ─── Separator ───────────────────────────────────────── */
    .divider {
      height: 1px; background: var(--border); margin: 14px 0;
      position: relative;
    }
    .divider::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent);
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="app-wrapper">

  <!-- Header -->
  <header class="header">
    <div class="header-icon">🧾</div>
    <div>
      <div class="header-title">Form Tính Tiền Hóa Đơn</div>
      <div class="header-sub">Tính tiền phòng &amp; xuất hóa đơn tự động</div>
    </div>
  </header>

  <!-- Scrollable content -->
  <div class="main-content">

    <!-- Card: Thông tin phòng -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon blue">🏨</div>
        <span class="card-title">Thông tin phòng</span>
      </div>
      <div class="card-body">
        <div class="form-grid">
          <div class="field">
            <label>Giá phòng / đêm (VNĐ)</label>
            <input id="giaPhong" class="money" type="text" inputmode="numeric" value="250,000" placeholder="250,000" />
          </div>
          <div class="field">
            <label>Số đêm</label>
            <input id="soDem" type="number" value="1" min="1" step="1" placeholder="1" />
          </div>
        </div>
        <div class="divider"></div>
        <div class="form-grid">
          <div class="field">
            <label>Kiểu xuất hóa đơn</label>
            <select id="kieuXuatHoaDon">
              <option value="bang_gia" selected>Xuất bằng giá phòng</option>
              <option value="cao_hon_10_15">Xuất cao hơn (10% + 15%)</option>
            </select>
          </div>
          <div class="field">
            <label>Tổng tiền muốn xuất (VNĐ)</label>
            <input id="tongTienMuonXuat" class="money" type="text" inputmode="numeric" value="" placeholder="0" />
            <span class="field-hint field-error" id="hint-tongTien" style="display:none;color:#f87171;">Không được thấp hơn tổng tiền phòng</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Card: Kết quả hóa đơn -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon amber">📊</div>
        <span class="card-title">Kết quả tính toán</span>
      </div>
      <div class="card-body">
        <div class="result-grid">
          <div class="result-row">
            <span class="result-label">Tổng tiền phòng</span>
            <span class="result-value" id="r-tongTienPhong">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">Tiền hóa đơn phòng</span>
            <span class="result-value" id="r-tienHoaDonPhong">—</span>
          </div>
          <div class="result-row" id="row-tienHoaDonThem">
            <span class="result-label">Tiền hóa đơn thêm</span>
            <span class="result-value" id="r-tienHoaDonThem">—</span>
          </div>
          <div class="result-row total" id="row-tongTienHoaDon">
            <span class="result-label">Tổng tiền hóa đơn</span>
            <span class="result-value" id="r-tongTienHoaDon">—</span>
          </div>
        </div>

        <div class="grand-total" id="grandTotal">
          <div class="grand-total-left">
            <span class="grand-total-tag">💰 Cần Thu</span>
            <span class="grand-total-label">Số tiền cần thu</span>
          </div>
          <span class="grand-total-value" id="r-soTienCanThu">—</span>
        </div>
      </div>
    </div>

  </div><!-- /main-content -->

  <!-- Bottom buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnTinh">
      <span>⚡</span> Tính Tiền
    </button>
    <button class="btn btn-ghost" id="btnReset">
      <span>🔄</span> Reset
    </button>
  </div>

</div><!-- /app-wrapper -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── Constants ─────────────────────────────────────────────────────────────
  const RESULT_IDS = ['r-tongTienPhong','r-tienHoaDonPhong','r-tienHoaDonThem','r-tongTienHoaDon','r-soTienCanThu'];

  // ─── Format tiền ──────────────────────────────────────────────────────────
  const fmt = (n) => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return new Intl.NumberFormat('vi-VN').format(Math.round(n)) + ' ₫';
  };

  // ─── Format input tiền (dấu phẩy mỗi 1000) ───────────────────────────────
  function formatMoneyInput(input) {
    const pos = input.selectionStart;
    const oldLen = input.value.length;
    const raw = input.value.replace(/[^\d]/g, '');
    input.value = raw ? parseInt(raw, 10).toLocaleString('en-US') : '';
    const shift = input.value.length - oldLen;
    input.setSelectionRange(pos + shift, pos + shift);
  }

  function parseMoneyInput(id) {
    const el = document.getElementById(id);
    return el ? parseInt(el.value.replace(/,/g, ''), 10) || 0 : 0;
  }

  ['giaPhong', 'tongTienMuonXuat'].forEach(id => {
    document.getElementById(id).addEventListener('input', function () { formatMoneyInput(this); });
  });

  // ─── Ẩn/hiện ô tổng tiền muốn xuất và hàng tiền hóa đơn thêm ─────────────
  function updateFieldVisibility() {
    const isCaoHon = document.getElementById('kieuXuatHoaDon').value === 'cao_hon_10_15';
    const inputTong = document.getElementById('tongTienMuonXuat');
    inputTong.disabled = !isCaoHon;
    if (!isCaoHon) inputTong.value = '';
    document.getElementById('row-tienHoaDonThem').style.display = isCaoHon ? '' : 'none';
    document.getElementById('row-tongTienHoaDon').style.display = isCaoHon ? '' : 'none';
  }

  document.getElementById('kieuXuatHoaDon').addEventListener('change', () => {
    updateFieldVisibility();
    updateTinhBtn();
    RESULT_IDS.forEach(id => document.getElementById(id).textContent = '—');
  });

  // ─── Ẩn/hiện nút Tính Tiền theo điều kiện tổng tiền muốn xuất ─────────────
  function updateTinhBtn() {
    const isCaoHon = document.getElementById('kieuXuatHoaDon').value === 'cao_hon_10_15';
    const btn  = document.getElementById('btnTinh');
    const hint = document.getElementById('hint-tongTien');

    if (!isCaoHon) {
      btn.style.display  = '';
      hint.style.display = 'none';
      return;
    }

    const tongPhong = parseMoneyInput('giaPhong') * (parseFloat(document.getElementById('soDem').value) || 1);
    const invalid   = parseMoneyInput('tongTienMuonXuat') < tongPhong;
    btn.style.display  = invalid ? 'none' : '';
    hint.style.display = invalid ? '' : 'none';
  }

  ['giaPhong', 'soDem', 'tongTienMuonXuat'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateTinhBtn);
  });

  // ─── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3200);
  }

  // ─── Lấy dữ liệu form ─────────────────────────────────────────────────────
  function getFormData() {
    return {
      giaPhong:         parseMoneyInput('giaPhong'),
      soDeM:            parseFloat(document.getElementById('soDem').value) || 1,
      kieuXuatHoaDon:   document.getElementById('kieuXuatHoaDon').value,
      tongTienMuonXuat: parseMoneyInput('tongTienMuonXuat'),
    };
  }

  // ─── Hiển thị kết quả ─────────────────────────────────────────────────────
  function renderResult(r) {
    const fields = { 'r-tongTienPhong': r.tongTienPhong, 'r-tienHoaDonPhong': r.tienHoaDonPhong,
                     'r-tienHoaDonThem': r.tienHoaDonThem, 'r-tongTienHoaDon': r.tongTienHoaDon };
    for (const [id, val] of Object.entries(fields))
      document.getElementById(id).textContent = fmt(val);

    const el = document.getElementById('r-soTienCanThu');
    el.textContent = fmt(r.soTienCanThu);
    el.classList.remove('active');
    void el.offsetWidth;
    el.classList.add('active');
  }

  // ─── Tính tiền ────────────────────────────────────────────────────────────
  document.getElementById('btnTinh').addEventListener('click', async () => {
    const data = getFormData();
    if (data.giaPhong <= 0) return showToast('⚠️ Vui lòng nhập giá phòng', 'error');
    if (data.soDeM   <= 0) return showToast('⚠️ Số đêm phải lớn hơn 0',   'error');

    try {
      const result = await window.api.tinhTien(data);
      renderResult(result);
      showToast('✅ Đã tính xong!', 'success');
    } catch (err) {
      showToast('❌ Lỗi tính toán: ' + err.message, 'error');
    }
  });

  // ─── Reset ────────────────────────────────────────────────────────────────
  document.getElementById('btnReset').addEventListener('click', () => {
    document.getElementById('giaPhong').value         = '250,000';
    document.getElementById('soDem').value            = '1';
    document.getElementById('kieuXuatHoaDon').value   = 'bang_gia';
    document.getElementById('tongTienMuonXuat').value = '';
    updateFieldVisibility();
    updateTinhBtn();
    RESULT_IDS.forEach(id => document.getElementById(id).textContent = '—');
    showToast('🔄 Đã reset form', 'info');
  });

  // Tính lần đầu khi load
  window.addEventListener('DOMContentLoaded', () => {
    updateFieldVisibility();
    updateTinhBtn();
    document.getElementById('btnTinh').click();
  });
</script>
</body>
</html>
